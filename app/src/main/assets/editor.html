<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #0D0D0D; overflow: hidden; }
        #editor { position: absolute; top: 0; bottom: 0; left: 0; right: 0; font-size: 16px; }
        /* Biar saran kode (popup) tampilannya gak berantakan di mobile */
        .ace_autocomplete { width: 250px !important; font-size: 14px !important; }
    </style>
</head>
<body>
    <div id="editor"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-modelist.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-language_tools.min.js"></script>
    
    <script>
        var editor = ace.edit("editor");
        // Biar Ace bisa download mode bahasa secara otomatis pas dibutuhkan
        ace.config.set("basePath", "https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/");
        
        var modelist = ace.require("ace/ext/modelist");
        
        // Aktifkan Fitur Autocomplete
        ace.require("ace/ext/language_tools");

        editor.setTheme("ace/theme/monokai");
        editor.setOptions({
            useWorker: false,
            behavioursEnabled: true,
            wrap: true,
            fontSize: "16px",
            showPrintMargin: false,
            // AKTIFKAN SARAN KODE DI SINI
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true, // Ngetik langsung muncul saran
            enableSnippets: true
        });

        // Mapping manual buat nambahin pinter (Opsional tapi bagus buat HTML)
        function setCode(code, filename) {
            var mode = modelist.getModeForPath(filename).mode;
            editor.session.setMode(mode);
            editor.setValue(code, -1);
            editor.session.getUndoManager().reset();
        }

        function getCode() { return editor.getValue(); }

        function applySettings(config) {
            if(!config) return;
            if(config.fontSize) editor.setFontSize(parseInt(config.fontSize));
            if(config.tabSize) editor.getSession().setTabSize(config.tabSize);
            editor.getSession().setUseWrapMode(config.textWrap !== false);
            editor.setOption("showLineNumbers", config.linenumbers !== false);
        }

        function handleShortcut(label) {
            editor.focus();
            if (label === "TAB" || label === "➜") {
                // Jika menu autocomplete lagi muncul, pilih sarannya
                if (editor.completer && editor.completer.activated) {
                    editor.completer.insertMatch();
                } else {
                    var pos = editor.getCursorPosition();
                    var line = editor.session.getLine(pos.row);
                    
                    // EMET PRO: ! + TAB
                    if (line.trim() === "!") {
                        var bp = '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <meta http-equiv="X-UA-Compatible" content="ie=edge">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>';
                        
                        // Hapus tanda seru dan ganti dengan boilerplate
                        editor.navigateLeft(1); 
                        editor.remove("right"); 
                        editor.insert(bp);
                        
                        // Kursor otomatis pindah ke dalem body (baris ke-10)
                        editor.moveCursorTo(pos.row + 9, 2);
                    } else { 
                        editor.insert("\t"); 
                    }
                }
            } else { 
                editor.insert(label); 
            }
        }
        
    </script>
</body>
</html>
