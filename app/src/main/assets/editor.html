<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: #0D0D0D; overflow: hidden; }
        #editor { position: absolute; top: 0; bottom: 0; left: 0; right: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            useWorker: false,
            behavioursEnabled: true,
            wrap: true
        });

        function setCode(code, mode) {
            editor.session.setMode("ace/mode/" + mode);
            editor.setValue(code, -1);
        }

        function getCode() { return editor.getValue(); }

        function handleShortcut(label) {
            if (label === "TAB") {
                var pos = editor.getCursorPosition();
                var line = editor.session.getLine(pos.row);
                var beforeCursor = line.substring(0, pos.column);
                
                if (beforeCursor.trim() === "!") {
                    var bp = '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <meta http-equiv="X-UA-Compatible" content="ie=edge">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>';
                    editor.navigateLeft(1);
                    editor.remove("right");
                    editor.insert(bp);
                } else {
                    editor.insert("\t");
                }
            } else {
                editor.insert(label);
            }
        }
    </script>
</body>
</html>
