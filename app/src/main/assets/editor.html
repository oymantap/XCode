<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/theme-monokai.min.css">
    <style>
        body { margin: 0; padding: 0; background: #0D0D0D; }
        #editor { position: absolute; top: 0; bottom: 0; left: 0; right: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-language_tools.min.js"></script>
    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/html");
        editor.setOptions({ enableBasicAutocompletion: true, enableLiveAutocompletion: true });

        function setCode(code, mode) {
            editor.session.setMode("ace/mode/" + mode);
            editor.setValue(code, -1);
        }
        function getCode() { return editor.getValue(); }
    </script>
</body>
</html>
