<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: #0D0D0D; overflow: hidden; }
        #editor { position: absolute; top: 0; bottom: 0; left: 0; right: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ext-modelist.min.js"></script>
    <script>
        var editor = ace.edit("editor");
        var modelist = ace.require("ace/ext/modelist");
        editor.setTheme("ace/theme/monokai");
        editor.setOptions({
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            useWorker: false,
            behavioursEnabled: true,
            wrap: true
        });

        function setCode(code, filename) {
            // Otomatis deteksi mode berdasarkan nama file
            var mode = modelist.getModeForPath(filename).mode;
            editor.session.setMode(mode);
            editor.setValue(code, -1);
            editor.session.getUndoManager().reset(); // Reset undo biar ga campur antar file
        }

        function getCode() { return editor.getValue(); }

        function applySettings(config) {
            if(!config) return;
            editor.setFontSize(parseInt(config.fontSize) || 14);
            if(config.editorTheme) editor.setTheme("ace/theme/" + config.editorTheme);
            if(config.tabSize) editor.getSession().setTabSize(config.tabSize);
            editor.getSession().setUseWrapMode(config.textWrap !== false);
            editor.setOption("showLineNumbers", config.linenumbers !== false);
        }

        function handleShortcut(label) {
            editor.focus();
            if (label === "TAB") {
                var pos = editor.getCursorPosition();
                var line = editor.session.getLine(pos.row);
                if (line.trim() === "!") {
                    var bp = '<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <title>Document</title>\n</head>\n<body>\n\n</body>\n</html>';
                    editor.navigateLeft(1); editor.remove("right"); editor.insert(bp);
                } else { editor.insert("\t"); }
            } else { editor.insert(label); }
        }

        function editorUndo() { editor.undo(); }
        function editorRedo() { editor.redo(); }
    </script>
</body>
</html>
