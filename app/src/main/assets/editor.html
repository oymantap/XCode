<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
        var editor;
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});

        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('container'), {
                value: "// Welcome to XCode Pro",
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false },
                wordWrap: 'on',
                scrollbar: { vertical: 'hidden', horizontal: 'hidden' },
                lineNumbers: 'on',
                tabSize: 4
            });
        });

        function setCode(code, filename) {
            if (!editor) return;
            var ext = filename.split('.').pop().toLowerCase();
            var mode = 'plaintext';
            
            // Mapping bahasa biar pinter
            var mapping = {
                'html': 'html', 'js': 'javascript', 'css': 'css', 'json': 'json',
                'kt': 'kotlin', 'kts': 'kotlin', 'java': 'java', 'dart': 'dart',
                'py': 'python', 'go': 'go', 'rs': 'rust', 'rb': 'ruby',
                'ts': 'typescript', 'tsx': 'typescript', 'jsx': 'javascript',
                'sql': 'sql', 'lua': 'lua', 'php': 'php', 'xml': 'xml'
            };
            
            mode = mapping[ext] || 'plaintext';
            
            var model = monaco.editor.createModel(code, mode);
            editor.setModel(model);
        }

        function getCode() { return editor.getValue(); }

        function applySettings(config) {
            if(!editor || !config) return;
            editor.updateOptions({
                fontSize: parseInt(config.fontSize) || 14,
                wordWrap: config.textWrap ? 'on' : 'off',
                lineNumbers: config.linenumbers ? 'on' : 'off',
                tabSize: config.tabSize || 4
            });
            if(config.editorTheme) monaco.editor.setTheme(config.editorTheme === 'monokai' ? 'vs-dark' : 'vs-dark');
        }

        function handleShortcut(label) {
            if (!editor) return;
            editor.focus();
            
            if (label === "TAB") {
                var selection = editor.getSelection();
                var model = editor.getModel();
                var pos = editor.getPosition();
                var lineContent = model.getLineContent(pos.lineNumber);
                
                // Emmet sederhana: Ketik '!' terus TAB
                if (lineContent.trim() === "!") {
                    var bp = '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>';
                    editor.executeEdits("", [{
                        range: new monaco.Range(pos.lineNumber, 1, pos.lineNumber, pos.column),
                        text: bp
                    }]);
                } else {
                    editor.trigger('keyboard', 'type', { text: "\t" });
                }
            } else {
                editor.trigger('keyboard', 'type', { text: label });
            }
        }

        function editorUndo() { editor.trigger('keyboard', 'undo'); }
        function editorRedo() { editor.trigger('keyboard', 'redo'); }
    </script>
</body>
</html>
