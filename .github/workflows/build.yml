name: XCode Mega Project Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install gradle -y

      - name: Build Release APK
        run: gradle clean assembleRelease

      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK (Cool Name)
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} XCode-Mega-Release.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: XCode-Mega-Release
          path: XCode-Mega-Release.apk
