name: XCode Mega Project Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build Release APK
        run: gradle clean assembleRelease

      - name: Install zipalign
        run: |
           sudo apt-get update
           sudo apt-get install -y zipalign

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} XCode-Mega-Release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCode-Mega-Release
          path: XCode-Mega-Release.apk
